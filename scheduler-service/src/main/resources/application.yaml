spring:
  application:
    name: scheduler-service
  cassandra:
    keyspace-name: job_scheduler
    contact-points: localhost
    port: 9042
    local-datacenter: datacenter1
    schema-action: create_if_not_exists

kairos:
  raft:
    group-id: 6ba7b810-9dad-11d1-80b4-00c04fd430c8
    storage-dir: /tmp/kairos-raft
    peers: ${RAFT_PEERS:scheduler-1:localhost:9090,scheduler-2:localhost:9091,scheduler-3:localhost:9092}
    single-node: ${RAFT_SINGLE_NODE:false}
    node-id: ${NODE_ID:scheduler-1}
    port: ${RAFT_PORT:9090}
    address: ${RAFT_ADDRESS:localhost}
  scheduler:
    worker-heartbeat-interval-ms: ${WORKER_HEARTBEAT_INTERVAL_MS:2000}
    worker-heartbeat-timeout-ms: ${WORKER_HEARTBEAT_TIMEOUT_MS:8000}
    worker-liveness-check-ms: ${WORKER_LIVENESS_CHECK_MS:3000}

server:
  port: ${SERVER_PORT:8081}

logging:
  level:
    org.apache.ratis.grpc.server.GrpcLogAppender: WARN
    org.apache.ratis.server.leader.FollowerInfo: WARN
